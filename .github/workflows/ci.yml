name: Poker Arena CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint poker_agent_arena/
        run: |
          python -m flake8 poker_agent_arena/ \
            --max-line-length=100 \
            --count \
            --statistics

  # ── 2. Test custom agents vs baselines (runs on every PR and push) ─────────
  test-baselines:
    name: Agents vs Baselines
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run arena baseline tests (CI mode)
        run: python -m poker_agent_arena.arena.arena --baselines --ci --quick

      - name: Upload arena results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-results-${{ github.run_id }}
          path: poker_agent_arena/results/arena_results.json

  # ── 3. Round-robin tournament (push to main only — keeps PRs fast) ─────────
  round-robin:
    name: Round-Robin Tournament
    runs-on: ubuntu-latest
    needs: test-baselines
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run round-robin tournament
        run: python -m poker_agent_arena.arena.arena --round-robin

      - name: Upload round-robin results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: round-robin-results-${{ github.run_id }}
          path: poker_agent_arena/results/arena_results.json
